# Deliberate publish parity: offline manual + public-tree guard (see scripts/mirror-public/README.md)
name: Publish tree verify

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: publish-tree-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Offline manual matches Markdown sources
        run: node User_Manual/build-manual-html.mjs --check

      - name: No blocked internal-attribution strings
        run: bash scripts/mirror-public/verify-public-no-vendor.sh
