# Azure DevOps — same checks as .github/workflows/sdlc-ci.yml
# Add this file to your repo root and create a pipeline pointing at it.
trigger:
  branches:
    include:
      - main
      - master
      - develop

pr:
  branches:
    include:
      - main
      - master
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  CI: true
  SDL_SKIP_MODULE_INIT: "1"

steps:
  - checkout: self
    fetchDepth: 0

  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: Use Node.js 20

  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.11"
    displayName: Use Python 3.11

  - script: |
      set -e
      cd plugins/ide-plugin
      if [ -f package-lock.json ]; then npm ci --omit=dev; else npm install --production; fi
    displayName: npm install (ide-plugin)

  - script: bash scripts/ci-sdlc-platform.sh
    displayName: SDLC Platform CI
